version: "3.8"

services:
  # OPC UA Server with simulated machines
  opcua-server:
    build: ./opcua-server
    container_name: opcua-server
    ports:
      - "4840:4840"
      - "3001:3001"
    networks:
      - factory

  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - factory

  # MQTT Logger: subscribes to factory/# and prints messages to stdout
  mqtt-logger:
    build: ./mqtt-logger
    container_name: mqtt-logger
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mqtt://mosquitto:1883
      - MQTT_TOPIC=factory/#
    networks:
      - factory

  # Bridge: OPC UA -> MQTT -> InfluxDB
  data-bridge:
    build: ./data-bridge
    container_name: data-bridge
    depends_on:
      - opcua-server
      - mosquitto
      - influxdb
    environment:
      - OPCUA_ENDPOINT=opc.tcp://opcua-server:4840/UA/Factory
      - MQTT_BROKER=mqtt://mosquitto:1883
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    networks:
      - factory

  # InfluxDB for time series storage
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - factory

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb
    networks:
      - factory

  # Event trigger UI (FastAPI)
  trigger-ui:
    build: ./trigger-ui
    container_name: trigger-ui
    ports:
      - "8080:8080"
    depends_on:
      - opcua-server
    environment:
      - OPCUA_HTTP_URL=http://opcua-server:3001
    networks:
      - factory

volumes:
  influxdb-data:

networks:
  factory:
    driver: bridge
