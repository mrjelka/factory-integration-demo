# ============================================================
# PRODUCTION OVERRIDE — backend services only.
#
# Caddy + TLS + the factory.rjelka.de landing page now live in the
# sibling repo /opt/rjelka.de. This override:
#   - drops all host-published ports (Caddy fronts everything)
#   - attaches HTTP-fronted services to the external `web` network
#     so the Caddy in /opt/rjelka.de can reach them by container name
#   - keeps the internal `factory` network for inter-service comms
#
# Usage on the VPS:
#   # 1. The shared network must already exist (the rjelka.de Makefile
#   #    creates it; or: docker network create web)
#   # 2. cd /opt/factory-integration-demo
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  opcua-server:
    ports: []
    expose:
      - "4840"
      - "3001"
    networks:
      - factory
      - web
    restart: unless-stopped

  mosquitto:
    ports: []
    expose:
      - "1883"
      - "9001"
    networks:
      - factory
    restart: unless-stopped

  mqtt-logger:
    networks:
      - factory
    restart: unless-stopped

  data-bridge:
    environment:
      - OPCUA_ENDPOINT=opc.tcp://opcua-server:4840
    networks:
      - factory
    restart: unless-stopped

  influxdb:
    ports: []
    expose:
      - "8086"
    networks:
      - factory
      - web
    restart: unless-stopped

  grafana:
    ports: []
    expose:
      - "3000"
    environment:
      - GF_SERVER_ROOT_URL=https://factory.rjelka.de/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    networks:
      - factory
      - web
    restart: unless-stopped

  trigger-ui:
    ports: []
    expose:
      - "8080"
    networks:
      - factory
      - web
    restart: unless-stopped

networks:
  web:
    external: true
    name: web
